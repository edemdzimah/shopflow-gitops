apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders-service
  template:
    metadata:
      labels:
        app: orders-service
    spec:
      containers:
        - name: orders-service
          # EDIT: your ECR registry. Jenkins updates this tag on each release.
          image: 071231919766.dkr.ecr.us-east-1.amazonaws.com/shopflow-orders:1.0
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom: { configMapKeyRef: { name: shopflow-config, key: SPRING_DATASOURCE_URL } }
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom: { secretKeyRef: { name: db-credentials, key: username } }
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom: { secretKeyRef: { name: db-credentials, key: password } }
            - name: CATALOG_URL
              value: "http://catalog-service:8080"
            - name: ORDER_EVENTS_QUEUE_NAME
              valueFrom: { configMapKeyRef: { name: shopflow-config, key: ORDER_EVENTS_QUEUE_NAME } }
            - name: AWS_REGION
              valueFrom: { configMapKeyRef: { name: shopflow-config, key: AWS_REGION } }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: orders-service
spec:
  selector:
    app: orders-service
  ports:
    - port: 8080
      targetPort: 8080
